name: Format Code

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '22.13.1'
          cache: 'npm'

      - run: npm install
      - run: npm run lint:fix
      - run: npm run test
      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v4
