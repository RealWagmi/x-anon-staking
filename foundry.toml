[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "cache_foundry"

# Solidity compiler settings (match hardhat config)
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 999
evm_version = "paris"

# Fuzz testing configuration
[fuzz]
runs = 1000              # Number of fuzz runs per test
max_test_rejects = 100000 # Max rejections from vm.assume
seed = "0x123"           # Reproducible randomness

# Invariant testing configuration
[invariant]
runs = 256
depth = 15
fail_on_revert = true

# Gas reporting
gas_reports = ["xAnonStakingNFT"]

